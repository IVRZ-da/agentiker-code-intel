name: Code Intel CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: python-test
    steps:
      - uses: actions/checkout@v4
      - name: Setup PYTHONPATH for package import
        run: |
          ln -sf $(pwd) /tmp/code_intel
      - name: Run tests (except E2E/LSP integration)
        run: |
          PYTHONPATH=/tmp python3 -m pytest tests/ -v --tb=short --ignore=tests/test_e2e_lifecycle.py --ignore=tests/test_e2e_real_tools.py --ignore=tests/test_e2e_workflows.py --ignore=tests/test_lsp_integration.py
