name: Code Intel CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: python-test
    steps:
      - uses: actions/checkout@v4
      - name: Setup PYTHONPATH for package import
        run: |
          ln -sf $(pwd) /tmp/code_intel
      - name: Run tests
        run: |
          PYTHONPATH=/tmp python3 -m pytest tests/ -v --tb=short
