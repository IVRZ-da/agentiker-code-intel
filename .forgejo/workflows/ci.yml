name: Code Intel CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: python-test
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          pip install tree-sitter ast-grep-py hypothesis --break-system-packages -q 2>/dev/null || true
      - name: Run tests
        run: |
          PYTHONPATH=. python3 -m pytest tests/ -v --tb=short
