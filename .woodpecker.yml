when:
  - event: push
  - event: pull_request

steps:
  - name: readme
    image: python:3.12
    commands:
      - pip install tree-sitter tree-sitter-python tree-sitter-javascript tree-sitter-typescript tree-sitter-rust tree-sitter-go tree-sitter-java
      - python scripts/generate_readme.py --check

  - name: lint
    image: python:3.12
    commands:
      - pip install ruff
      - ruff check .
      - ruff format --check .

  - name: typecheck
    image: python:3.12
    commands:
      - pip install pyright
      - pyright .

  - name: test
    image: python:3.12
    commands:
      - pip install uv
      - uv pip install --system ".[dev]"
      - python -m pytest tests/ -q --tb=short
    environment:
      CI: "true"

  - name: release
    image: python:3.12
    commands:
      - pip install build twine
      - python -m build
    when:
      event: tag
