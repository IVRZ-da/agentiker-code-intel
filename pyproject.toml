[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "agentiker-code-intel-plugin"
version = "0.27.00"
description = "AST-aware code intelligence for Hermes Agent — tree-sitter + ast-grep + LSP"
authors = [
    {name = "Johannes Lettner", email = "johannes@ivory.green"},
]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
    "tree-sitter>=0.24.0",
    "tree-sitter-languages",
    "ast-grep-py>=0.37.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
]

[tool.pytest.ini_options]
pythonpath = [".."]
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["code_intel"]
omit = ["tests/*", "scripts/*"]
relative_files = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise AssertionError",
    "raise NotImplementedError",
]
